<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07140f" />

  <link rel="stylesheet" href="css/style.css" />

<body class="course-page">
  <a class="skip-link" href="#conteudo">Pular para o conteúdo</a>
  <div class="page-texture" aria-hidden="true"></div>

  <header class="site-header course-header">
    <div class="container header-shell">
      <nav class="topbar" aria-label="Navegação principal">
        <a class="brand" href="index.html" aria-label="Inteligência Mil Grau — início">
          <span class="brand-mark" aria-hidden="true">
            <span></span>
          </span>
          <span class="brand-copy">
            <strong>Inteligência</strong>
            <small>Mil Grau</small>
          </span>
        </a>

        <a class="channel-link" href="https://www.youtube.com/@intelig%C3%AAnciamilgrau" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21.6 7.2a2.9 2.9 0 0 0-2-2C17.8 4.7 12 4.7 12 4.7s-5.8 0-7.6.5a2.9 2.9 0 0 0-2 2A30 30 0 0 0 2 12a30 30 0 0 0 .4 4.8 2.9 2.9 0 0 0 2 2c1.8.5 7.6.5 7.6.5s5.8 0 7.6-.5a2.9 2.9 0 0 0 2-2A30 30 0 0 0 22 12a30 30 0 0 0-.4-4.8ZM10 15.2V8.8l5.5 3.2-5.5 3.2Z"/>
          </svg>
          <span>Ver canal</span>
        </a>
      </nav>
    </div>
  </header>

  <main id="conteudo" class="course-main">
    <section class="course-shell container" aria-label="Conteúdo da trilha">
      <nav class="course-toolbar" aria-label="Navegação entre trilhas">
        <a class="course-back" href="index.html">
          <span aria-hidden="true">←</span>
          Todas as trilhas
        </a>

        <div class="course-switcher">
          <span class="course-switcher-label">Trocar trilha</span>
          <div id="course-switcher-options" class="course-switcher-options">
            <span class="course-switcher-loading">Carregando...</span>
          </div>
        </div>
      </nav>

      <div id="course-content" class="course-page-content" aria-live="polite">
        <p class="course-loading"><span></span>Carregando trilha...</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <a class="brand brand-footer" href="index.html" aria-label="Inteligência Mil Grau — início">
        <span class="brand-mark" aria-hidden="true"><span></span></span>
        <span class="brand-copy"><strong>Inteligência</strong><small>Mil Grau</small></span>
      </a>
      <p>Conteúdo para levar a inteligência artificial mais longe.</p>
      <span class="footer-origin">
        <i aria-hidden="true"></i>
        Criado no Brasil
      </span>
    </div>

  <script src="js/trilha.js"></script>

</html>
