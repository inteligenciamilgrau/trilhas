name: Atualizar trilhas do YouTube

on:
  schedule:
    # 12:00 UTC = 09:00 no horário de Brasília (sem horário de verão)
    - cron: "0 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-playlists:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Buscar dados atualizados das playlists
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch-playlists.mjs

      - name: Commitar alterações (se houver)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/playlists.json; then
            echo "Nenhuma mudança nas playlists."
          else
            git add data/playlists.json
            git commit -m "chore: atualizar trilhas do YouTube"
            git push
          fi
